name: CI / CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Frontend — lint + build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: Backend — install + syntax check
  # ─────────────────────────────────────────────
  backend:
    name: Backend (install + syntax check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check (no DB needed)
        run: npm run check

  # ─────────────────────────────────────────────
  # Job 3: Deploy — SSH to server (main only)
  # Runs only on push to main, after CI passes
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Installing backend dependencies ──"
            cd backend
            npm ci --omit=dev
            cd ..

            echo "── Building frontend ──"
            cd frontend
            npm ci
            npm run build
            cd ..

            echo "── Restarting backend (PM2) ──"
            pm2 restart laundry-backend \
              || pm2 start backend/src/server.js \
                   --name laundry-backend \
                   --env production

            pm2 save

            echo "── Deploy complete ──"
